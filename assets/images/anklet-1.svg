<svg xmlns="http://www.w3.org/2000/svg" width="900" height="675" viewBox="0 0 900 675">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#F7ECE0"/>
      <stop offset="100%" stop-color="#E8D5C0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="675" fill="url(#bg4)"/>
  <!-- Shadow -->
  <ellipse cx="450" cy="400" rx="220" ry="18" fill="#000" opacity="0.03"/>
  <!-- Anklet - delicate curved line with small beads -->
  <g transform="translate(450,320)">
    <!-- Chain line -->
    <path d="M-240,-10 Q-200,60 -120,80 Q0,95 120,80 Q200,60 240,-10"
          fill="none" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
    <!-- Small delicate beads -->
    <circle cx="-230" cy="-2" r="7" fill="#046A38" opacity="0.85"/>
    <circle cx="-208" cy="18" r="6" fill="#E3C4A8" stroke="#d4b08c" stroke-width="0.5" opacity="0.85"/>
    <circle cx="-186" cy="36" r="7" fill="#D946EF" opacity="0.85"/>
    <circle cx="-162" cy="50" r="6" fill="#046A38" opacity="0.85"/>
    <circle cx="-136" cy="62" r="7" fill="#2563EB" opacity="0.85"/>
    <circle cx="-108" cy="72" r="6" fill="#E3C4A8" stroke="#d4b08c" stroke-width="0.5" opacity="0.85"/>
    <circle cx="-80" cy="78" r="7" fill="#046A38" opacity="0.85"/>
    <circle cx="-50" cy="84" r="6" fill="#D946EF" opacity="0.85"/>
    <circle cx="-20" cy="86" r="7" fill="#2563EB" opacity="0.85"/>
    <!-- Center charm -->
    <circle cx="0" cy="88" r="10" fill="#046A38" opacity="0.9"/>
    <circle cx="0" cy="88" r="5" fill="#C9A227" opacity="0.7"/>
    <!-- Dangling charm -->
    <line x1="0" y1="98" x2="0" y2="116" stroke="#C9A227" stroke-width="0.8" opacity="0.5"/>
    <circle cx="0" cy="120" r="4" fill="#D946EF" opacity="0.7"/>
    <!-- Right side -->
    <circle cx="20" cy="86" r="7" fill="#E3C4A8" stroke="#d4b08c" stroke-width="0.5" opacity="0.85"/>
    <circle cx="50" cy="84" r="6" fill="#046A38" opacity="0.85"/>
    <circle cx="80" cy="78" r="7" fill="#2563EB" opacity="0.85"/>
    <circle cx="108" cy="72" r="6" fill="#D946EF" opacity="0.85"/>
    <circle cx="136" cy="62" r="7" fill="#E3C4A8" stroke="#d4b08c" stroke-width="0.5" opacity="0.85"/>
    <circle cx="162" cy="50" r="6" fill="#046A38" opacity="0.85"/>
    <circle cx="186" cy="36" r="7" fill="#2563EB" opacity="0.85"/>
    <circle cx="208" cy="18" r="6" fill="#046A38" opacity="0.85"/>
    <circle cx="230" cy="-2" r="7" fill="#E3C4A8" stroke="#d4b08c" stroke-width="0.5" opacity="0.85"/>
    <!-- Clasp -->
    <circle cx="238" cy="-8" r="3" fill="#C9A227" opacity="0.6"/>
    <circle cx="-238" cy="-8" r="3" fill="#C9A227" opacity="0.6"/>
  </g>
  <text x="450" y="620" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#046A38" opacity="0.25" letter-spacing="0.15em">MINIMAL BEADED ANKLET</text>
</svg>