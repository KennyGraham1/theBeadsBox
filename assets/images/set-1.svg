    <circle cx="-102" cy="74" r="11" fill="#C9A227"/>
    <circle cx="-78" cy="92" r="12" fill="#046A38"/>
    <circle cx="-50" cy="108" r="13" fill="#7F1D1D"/>
    <circle cx="-18" cy="118" r="14" fill="#C9A227"/>
    <!-- Center -->
    <circle cx="0" cy="150" r="18" fill="#046A38"/>
