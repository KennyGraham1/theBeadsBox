  <text x="450" y="434" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#046A38" opacity="0.35" letter-spacing="0.15em">MATCHING SET</text>
  <text x="450" y="625" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#046A38" opacity="0.25" letter-spacing="0.15em">NECKLACE + BRACELET</text>
</svg>