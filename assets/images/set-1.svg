    <circle cx="-72" cy="-48" r="11" fill="#7F1D1D" opacity="0.8"/>
    <circle cx="-46" cy="-50" r="10" fill="#046A38" opacity="0.8"/>
    <circle cx="-18" cy="-50" r="11" fill="#E3C4A8" opacity="0.8" stroke="#d4b08c" stroke-width="0.5"/>
    <circle cx="10" cy="-50" r="10" fill="#C9A227" opacity="0.8"/>
    <circle cx="38" cy="-50" r="11" fill="#046A38" opacity="0.8"/>
    <circle cx="64" cy="-48" r="10" fill="#7F1D1D" opacity="0.8"/>
    <circle cx="88" cy="-42" r="11" fill="#E3C4A8" opacity="0.8" stroke="#d4b08c" stroke-width="0.5"/>
