    <circle cx="78" cy="92" r="12" fill="#7F1D1D"/>
    <circle cx="102" cy="74" r="11" fill="#C9A227"/>
    <circle cx="120" cy="52" r="12" fill="#046A38"/>
    <circle cx="132" cy="26" r="11" fill="#E3C4A8" stroke="#d4b08c" stroke-width="1"/>
    <circle cx="140" cy="-4" r="12" fill="#C9A227"/>
    <circle cx="142" cy="-34" r="11" fill="#7F1D1D"/>
    <circle cx="140" cy="-65" r="12" fill="#046A38"/>
    <circle cx="136" cy="-95" r="11" fill="#E3C4A8" stroke="#d4b08c" stroke-width="1"/>
  </g>
  <!-- Matching bracelet below -->
  <g transform="translate(450,500)">
    <ellipse cx="0" cy="0" rx="120" ry="50" fill="none" stroke="#8B7355" stroke-width="0.8" opacity="0.1"/>
